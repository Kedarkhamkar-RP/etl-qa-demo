- script: |
    pytest tests/test_provider_rad_roster_view.py --html=reports/report.html --self-contained-html || true
  displayName: Run QA Tests
 
- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: 'reports'
    artifactName: 'QA-Reports'